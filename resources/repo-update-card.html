<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{update.platformLabel}} 仓库更新</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1080px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #20252d;
      background: #f5f7f9;
    }

    #container {
      width: 1080px;
      padding: 48px 54px 42px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.78)),
        #f5f7f9;
      border-bottom: 40px solid {{update.accent}};
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .platform {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: {{update.accent}};
      font-size: 24px;
      font-weight: 760;
    }

    .platform-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: {{update.accent}};
      background: {{update.accentSoft}};
    }

    .platform-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      color: {{update.accent}};
      background: {{update.accentSoft}};
      font-size: 22px;
      font-weight: 760;
    }

    .badge-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: {{update.accent}};
    }

    .headline {
      margin-top: 32px;
    }

    .repo {
      color: #687586;
      font-size: 25px;
      line-height: 1;
      font-weight: 720;
    }

    .title {
      margin: 17px 0 0;
      color: #20252d;
      font-size: 38px;
      line-height: 1.18;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-top: 30px;
    }

    .field {
      min-width: 0;
      padding: 16px 18px;
      border: 1px solid rgba(32, 37, 45, 0.08);
      border-radius: 8px;
      background: #fff;
    }

    .field-label {
      color: #687586;
      font-size: 16px;
      line-height: 1;
    }

    .field-value {
      margin-top: 8px;
      color: #20252d;
      font-size: 20px;
      line-height: 1.28;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .field-value.mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    .field-value a {
      color: {{update.accent}};
      text-decoration: none;
    }

    .footer {
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border: 1px solid rgba(32, 37, 45, 0.08);
      border-radius: 8px;
      background: #fff;
    }

    .footer-time {
      color: #687586;
      font-size: 18px;
    }

    .footer-link {
      color: {{update.accent}};
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="top">
      <div class="platform">
        <span class="platform-icon">{{@ update.platformIconSvg}}</span>
        <span>{{update.platformLabel}}</span>
      </div>
      <div class="badge"><span class="badge-dot"></span>仓库更新</div>
    </div>

    <section class="headline">
      <div class="repo">{{update.fullName}}</div>
      <h1 class="title">{{update.message}}</h1>
    </section>

    <section class="meta">
      <div class="field">
        <div class="field-label">Commit</div>
        <div class="field-value mono">{{update.sha}}</div>
      </div>
      <div class="field">
        <div class="field-label">作者</div>
        <div class="field-value">{{update.author}}</div>
      </div>
      <div class="field">
        <div class="field-label">链接</div>
        <div class="field-value">{{if update.url}}<a href="{{update.url}}">查看详情</a>{{else}}无{{/if}}</div>
      </div>
    </section>

    <div class="footer">
      <span class="footer-time">{{update.time}}</span>
      {{if update.url}}
      <a class="footer-link" href="{{update.url}}">打开仓库 →</a>
      {{/if}}
    </div>
  </div>
</body>
</html>
