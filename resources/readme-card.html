<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{readme.repo}} README</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1440px;
      min-height: 980px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: #20252d;
      background: #f5f7f9;
    }

    #container {
      width: 1440px;
      min-height: 980px;
      padding: 56px 72px 48px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.78)),
        #f5f7f9;
      border-bottom: 42px solid {{readme.accent}};
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(32, 37, 45, 0.1);
    }

    .platform {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: {{readme.accent}};
      font-size: 24px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .platform-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: {{readme.accent}};
      background: {{readme.accentSoft}};
    }

    .platform-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .file {
      color: #687586;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .headline {
      margin-top: 34px;
    }

    .label {
      color: #687586;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
    }

    .title {
      margin: 16px 0 0;
      color: #20252d;
      font-size: 48px;
      line-height: 1.18;
      font-weight: 780;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .content {
      margin-top: 30px;
      padding: 32px 36px;
      border: 1px solid rgba(32, 37, 45, 0.08);
      border-radius: 8px;
      background: #fff;
    }

    .markdown {
      color: #374151;
      font-size: 21px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4,
    .markdown h5,
    .markdown h6 {
      margin: 24px 0 12px;
      color: #20252d;
      line-height: 1.24;
      font-weight: 780;
    }

    .markdown h1:first-child,
    .markdown h2:first-child,
    .markdown h3:first-child {
      margin-top: 0;
    }

    .markdown h1 { font-size: 34px; }
    .markdown h2 { font-size: 29px; }
    .markdown h3 { font-size: 25px; }
    .markdown h4 { font-size: 22px; }
    .markdown h5 { font-size: 20px; }
    .markdown h6 { font-size: 18px; color: #687586; }

    .markdown p {
      margin: 12px 0;
      white-space: normal;
    }

    .markdown ul,
    .markdown ol {
      margin: 12px 0 12px 26px;
      padding: 0;
    }

    .markdown ul ul,
    .markdown ul ol,
    .markdown ol ul,
    .markdown ol ol {
      margin-top: 4px;
      margin-bottom: 4px;
    }

    .markdown li {
      margin: 7px 0;
    }

    .markdown li > p {
      margin: 6px 0;
    }

    .markdown .task-list-item {
      list-style-type: none;
      margin-left: -24px;
    }

    .markdown input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0 8px 0 0;
      vertical-align: -3px;
      accent-color: {{readme.accent}};
    }

    .task-box {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-right: 8px;
      border: 1px solid rgba(32, 37, 45, 0.22);
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      vertical-align: -2px;
    }

    .task-box.checked {
      border-color: {{readme.accent}};
      background: {{readme.accent}};
    }

    .markdown blockquote {
      margin: 16px 0;
      padding: 12px 16px;
      border-left: 4px solid {{readme.accent}};
      color: #596579;
      background: {{readme.accentSoft}};
      white-space: pre-wrap;
    }

    .markdown details {
      margin: 16px 0;
      padding: 12px 16px;
      border: 1px solid rgba(32, 37, 45, 0.1);
      border-radius: 8px;
      background: #fafbfc;
    }

    .markdown summary {
      cursor: default;
      font-weight: 760;
      color: #20252d;
    }

    .markdown hr {
      height: 1px;
      margin: 24px 0;
      border: 0;
      background: rgba(32, 37, 45, 0.14);
    }

    .markdown table {
      width: 100%;
      margin: 16px 0;
      border-collapse: collapse;
      font-size: 18px;
      line-height: 1.45;
      table-layout: auto;
      word-break: break-word;
    }

    .markdown th,
    .markdown td {
      padding: 10px 12px;
      border: 1px solid rgba(32, 37, 45, 0.12);
      text-align: left;
      vertical-align: top;
    }

    .markdown th {
      color: #20252d;
      background: #f5f7f9;
      font-weight: 760;
    }

    .markdown pre {
      margin: 16px 0;
      padding: 16px 18px;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f7f9;
      border: 1px solid rgba(32, 37, 45, 0.08);
    }

    .markdown code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", "Noto Sans Mono CJK SC", monospace;
      font-size: 0.9em;
      color: #0f1720;
      background: #f5f7f9;
      border-radius: 4px;
      padding: 2px 5px;
    }

    .markdown pre code {
      display: block;
      padding: 0;
      background: transparent;
      white-space: pre-wrap;
    }

    .markdown a {
      color: {{readme.accent}};
      font-weight: 700;
      text-decoration: none;
    }

    .markdown strong {
      color: #20252d;
      font-weight: 780;
    }

    .markdown del,
    .markdown s {
      color: #687586;
    }

    .markdown img {
      display: inline-block;
      max-width: 100%;
      max-height: 420px;
      margin: 16px 0;
      border-radius: 8px;
      border: 1px solid rgba(32, 37, 45, 0.08);
      object-fit: contain;
      vertical-align: middle;
    }

    .markdown p img {
      max-height: 160px;
      margin: 6px 8px 6px 0;
    }

    .image-missing {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 4px 8px;
      border-radius: 6px;
      color: #687586;
      background: #f5f7f9;
      border: 1px solid rgba(32, 37, 45, 0.08);
      font-size: 0.86em;
    }

  </style>
</head>
<body>
  <div id="container">
    <div class="top">
      <div class="platform">
        <span class="platform-icon">{{@ readme.platformIconSvg}}</span>
        <span>{{readme.platformLabel}}</span>
      </div>
      <div class="file">{{readme.name}}</div>
    </div>

    <section class="headline">
      <div class="label">README</div>
      <h1 class="title">{{readme.repo}}</h1>
    </section>

    <section class="content">
      <div class="markdown">{{@ readme.html}}</div>
    </section>
  </div>
</body>
</html>
